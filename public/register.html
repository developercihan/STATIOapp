<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statio - Kayıt Ol</title>
    <link rel="stylesheet" href="styles.css?v=3">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            font-family: 'Chakra Petch', sans-serif;
        }
        .brand { font-family: 'Chakra Petch', sans-serif; color: var(--neon-cyan, #00f3ff); text-shadow: 0 0 10px var(--neon-cyan-glow, rgba(0,243,255,0.5)); }
        .register-card {
            width: 100%;
            max-width: 480px;
            padding: 48px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        .btn-social {
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-social:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--neon-purple);
        }
        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .separator::before, .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .separator:not(:empty)::before { margin-right: 1em; }
        .separator:not(:empty)::after { margin-left: 1em; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .whatsapp-float {
            position: fixed !important; 
            width: 48px !important; 
            height: 48px !important;
            bottom: 20px !important; 
            right: 20px !important; 
            background: linear-gradient(135deg, #25d366, #128c7e) !important;
            color: #FFF !important; 
            border-radius: 50px !important; 
            text-align: center !important;
            font-size: 26px !important; 
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5) !important;
            z-index: 999999 !important; 
            display: flex !important; 
            flex-direction: row-reverse !important;
            align-items: center !important;
            justify-content: center !important; 
            text-decoration: none !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            animation: whatsapp-pulse 2s infinite !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            overflow: hidden !important;
            white-space: nowrap !important;
            padding: 0 10px !important;
        }
        .whatsapp-float span {
            max-width: 0;
            opacity: 0;
            margin-right: 0;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.4s ease;
            color: #fff;
        }
        .whatsapp-float:hover {
            width: 180px !important;
            border-radius: 12px !important;
            transform: scale(1.05) !important;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.8) !important;
        }
        .whatsapp-float:hover span {
            max-width: 150px;
            opacity: 1;
            margin-right: 10px;
        }
        @keyframes whatsapp-pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
    </style>
</head>
<body class="register-page">
    <!-- WhatsApp Destek Butonu -->
    <a href="https://wa.me/905000000000?text=Merhaba,%20Statio%20kayıt%20sürecinde%20destek%20istiyorum." class="whatsapp-float" target="_blank" title="Destek">
        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp Destek</span>
    </a>
    <div class="stardust"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="register-container">
        <div class="register-card glass-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="/assets/logo.png" alt="Statio" style="width: 50px;">
                <h2 class="brand">Yeni Hesap Oluştur</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Hemen başlayın, 1 hafta ücretsiz deneyin.</p>
            </div>

            <div class="social-btns">
                <div class="btn-social" onclick="socialLogin('google')">
                    <img src="https://www.google.com/favicon.ico" style="width: 16px;"> Google
                </div>
                <div class="btn-social" onclick="socialLogin('facebook')">
                    <img src="https://www.facebook.com/favicon.ico" style="width: 16px;"> Facebook
                </div>
            </div>

            <div class="separator">veya e-posta ile devam et</div>

            <form id="register-form">
                <div class="form-group">
                    <label>Ad Soyad</label>
                    <input type="text" id="reg-name" required placeholder="Örn: Ahmet Yılmaz">
                </div>
                <div class="form-group">
                    <label>E-Posta Adresi</label>
                    <input type="email" id="reg-email" required placeholder="ornek@firma.com">
                </div>
                <div class="form-group">
                    <label>Kullanıcı Adı (Giriş için)</label>
                    <input type="text" id="reg-username" required placeholder="Örn: ahmetyilmaz" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Şifre (En az 6 karakter)</label>
                    <input type="password" id="reg-password" required minlength="6" placeholder="••••••••" autocomplete="new-password">
                </div>
                <!-- Yasal Onaylar -->
                <div class="legal-checks" style="margin-bottom: 20px; text-align: left; font-size: 0.85rem;">
                    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; color: #a0aec0; margin-bottom: 10px;">
                        <input type="checkbox" id="termsCheck" required style="margin-top: 3px; accent-color: #00f2fe;">
                        <span><a href="/terms.html" target="_blank" style="color: #00f2fe; text-decoration: none;">Kullanım Koşulları</a>'nı okudum ve kabul ediyorum.</span>
                    </label>
                    <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; color: #a0aec0;">
                        <input type="checkbox" id="kvkkCheck" required style="margin-top: 3px; accent-color: #00f2fe;">
                        <span><a href="/kvkk.html" target="_blank" style="color: #00f2fe; text-decoration: none;">KVKK Metni</a> ve Aydınlatma Formu'nu onaylıyorum.</span>
                    </label>
                </div>

                <button type="submit" class="login-btn" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);">
                    KAYIT OL VE BAŞLAT
                </button>
            </form>

            <div style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-secondary);">
                Zaten bir hesabınız var mı? <a href="/login.html" style="color: var(--neon-cyan); text-decoration: none; font-weight: 600;">Giriş Yap</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        async function socialLogin(provider) {
            // Demo amaçlı simülasyon
            showToast(provider + ' ile bağlanılıyor...', 'info');
            setTimeout(() => {
                window.location.href = '/onboarding.html?social=' + provider;
            }, 1000);
        }

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            const username = document.getElementById('reg-username').value;

            if (password.length < 6) {
                showToast('Şifre en az 6 karakter olmalıdır.', 'error');
                return;
            }

            // Kimlik bilgilerini sessionStorage'a güvenli şekilde sakla (URL'de şifre taşımamak için)
            sessionStorage.setItem('reg_data', JSON.stringify({ email, password, name, username }));
            window.location.href = '/onboarding.html';
        };

        function showToast(msg, type='success') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.borderColor = type === 'error' ? 'var(--neon-red)' : 'var(--neon-cyan)';
            t.innerHTML = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
