<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statio - Sipariş Takibi</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .whatsapp-float {
            position: fixed !important; 
            width: 48px !important; 
            height: 48px !important;
            bottom: 25px !important; 
            left: 85px !important; 
            background: linear-gradient(135deg, #25d366, #128c7e) !important;
            color: #FFF !important; 
            border-radius: 50px !important; 
            text-align: center !important;
            font-size: 26px !important; 
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5) !important;
            z-index: 999999 !important; 
            display: flex !important; 
            align-items: center !important;
            justify-content: center !important; 
            text-decoration: none !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            animation: whatsapp-pulse 2s infinite !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            overflow: hidden !important;
            white-space: nowrap !important;
            padding: 0 10px !important;
        }
        .whatsapp-float span {
            max-width: 0;
            opacity: 0;
            margin-left: 0;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.4s ease;
            color: #fff;
        }
        .whatsapp-float:hover {
            width: 180px !important;
            border-radius: 12px !important;
            transform: scale(1.05) !important;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.8) !important;
        }
        .whatsapp-float:hover span {
            max-width: 150px;
            opacity: 1;
            margin-left: 10px;
        }
        @keyframes whatsapp-pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        .page-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--glass-border); }
        .filters { display: flex; gap: 15px; padding: 20px 30px; background: rgba(13,15,31,0.5); }
        .table-container { padding: 0 30px; margin-top: 20px; overflow-x: auto;}
    </style>
</head>
<body>
    <!-- WhatsApp Destek Butonu -->
    <a href="https://wa.me/905000000000?text=Merhaba,%20Sipariş%20takibi%20ekranında%20bir%20sorun%20yaşıyorum." class="whatsapp-float" target="_blank" title="Destek">
        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp Destek</span>
    </a>
    <div class="stardust"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="profile-menu-container">
        <div class="profile-trigger" onclick="toggleProfileMenu()">
            <span id="user-initial">?</span>
        </div>
        <div class="profile-dropdown" id="profile-dropdown">
            <div class="user-info-small">
                <span id="user-display-name" class="name">Yükleniyor...</span>
                <span id="user-display-role" class="role">-</span>
            </div>
            <a href="javascript:void(0)" onclick="logout()" class="btn-logout-small">ÇIKIŞ YAP</a>
        </div>
    </div>
    
    <div class="page-header">
        <a href="/orders.html" class="brand-container" style="text-decoration:none;">
            <img src="/assets/logo.png" alt="Statio Logo" class="statio-logo">
            <span class="brand-text">STATIO</span>
            <span style="color:var(--text-secondary); margin-left: 10px; font-family: var(--font-heading); font-size: 0.8em; letter-spacing: 1px;">// SİPARİŞ TAKİP</span>
        </a>
        <a href="/siparis.html" class="btn" style="border-color:var(--neon-green); color:var(--neon-green); text-decoration:none; padding:8px 15px; font-size:0.85em; font-family:var(--font-heading); display:flex; align-items:center; gap:8px;">
            <span>🛒</span> SİPARİŞ EKRANINA DÖN
        </a>
    </div>
    
    <div class="filters">
        <select id="filter-status" style="width: 200px;">
            <option value="">Tüm Durumlar</option>
            <option value="YENI">YENİ</option>
            <option value="ATANDI">ATANDI</option>
            <option value="HAZIRLANIYOR">HAZIRLANIYOR</option>
            <option value="KARGODA">KARGODA</option>
            <option value="TESLIM_EDILDI">TESLİM EDİLDİ</option>
            <option value="IPTAL_EDILDI">İPTAL EDİLDİ</option>
        </select>
        <button class="btn btn-primary" onclick="loadOrders()">Listeyi Yenile</button>
    </div>
    
    <div class="table-container">
        <table class="data-table" id="orders-table">
            <thead>
                <tr>
                    <th>SİPARİŞ NO</th>
                    <th>DİSTRİBÜTÖR</th>
                    <th>KURUM</th>
                    <th>TUTAR</th>
                    <th>DURUM</th>
                    <th>TARİH</th>
                    <th>İŞLEMLER</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="7" style="text-align:center; padding:20px; color:var(--text-secondary);">Siparişler sunucudan çekiliyor...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Sipariş Detay Modalı -->
    <div class="modal-overlay" id="order-modal">
        <div class="modal-content glass-card">
            <h2 id="modal-title" class="brand">Sipariş Detayı</h2>
            <div id="modal-body" class="modal-body" style="grid-template-columns: 1fr;">
                <!-- Dinamik İçerik -->
            </div>
            <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" onclick="closeModal()">Kapat</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="theme.js?v=1"></script>
    <script src="orders.js"></script>
</body>
</html>
