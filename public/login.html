<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statio - Portal Giriş</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper {
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .login-logo-img { 
            width: 140px; height: auto; display: block; 
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.4)); 
            animation: logoEntrance 1s ease-out, floatAnimation 6s infinite ease-in-out; 
            margin: 0 auto;
        }
        
        @keyframes floatAnimation {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-logo-container { position: relative; margin-bottom: 40px; }
        
        @keyframes logoEntrance { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .login-subtitle { color: var(--text-secondary); margin-bottom: 30px; letter-spacing: 2px; font-family: var(--font-heading); font-size: 0.85em;}
        #login-error { color: var(--neon-red); font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 5px var(--neon-red); display: none; font-family: var(--font-heading);}
    </style>
</head>
<body>
    <div class="stardust"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="login-wrapper">
        <div class="glass-card login-card glow-pulse">
            <div class="login-logo-container">
                <img src="/assets/logo.png" alt="Statio Logo" class="login-logo-img" style="width: 250px;">
            </div>
            <div class="login-subtitle">YÖNETİM PANELİ :: GİRİŞ YAPIN</div>
            <div id="login-error">Yetkisiz Erişim!</div>
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Örn: admin" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="*****" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Giriş Yap</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
