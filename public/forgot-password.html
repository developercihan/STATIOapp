<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statio - Şifremi Unuttum</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper {
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .login-subtitle { color: var(--text-secondary); margin-bottom: 30px; letter-spacing: 2px; font-family: var(--font-heading); font-size: 0.85em;}
        #message-box { font-weight: bold; margin-bottom: 15px; font-family: var(--font-heading); display: none; padding: 10px; border-radius: 8px; }
        .success { color: var(--neon-cyan); text-shadow: 0 0 5px var(--neon-cyan); background: rgba(0, 243, 255, 0.1); }
        .error { color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red); background: rgba(255, 61, 61, 0.1); }
    </style>
</head>
<body>
    <div class="stardust"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="login-wrapper">
        <div class="glass-card login-card glow-pulse">
            <div class="login-logo-container" style="margin-bottom: 30px;">
                <img src="/assets/logo.png" alt="Statio Logo" style="width: 200px; filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.3));">
            </div>
            <div class="login-subtitle">ŞİFRE SIFIRLAMA</div>
            <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 25px; line-height: 1.5;">
                Hesabınıza kayıtlı e-posta adresini girin, size şifre sıfırlama linki gönderelim.
            </p>
            <div id="message-box"></div>
            <form id="forgot-form">
                <div class="form-group" style="text-align: left;">
                    <label>E-Posta Adresi</label>
                    <input type="email" id="email" placeholder="ornek@firma.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Link Gönder</button>
            </form>
            <div style="margin-top: 25px;">
                <a href="/login.html" style="color: var(--neon-cyan); font-size: 0.85em; text-decoration: none;">← Giriş Sayfasına Dön</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const msgBox = document.getElementById('message-box');

            btn.disabled = true;
            btn.textContent = 'Gönderiliyor...';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                msgBox.style.display = 'block';
                if (res.ok) {
                    msgBox.className = 'success';
                    msgBox.textContent = data.message;
                    e.target.style.display = 'none';
                } else {
                    msgBox.className = 'error';
                    msgBox.textContent = data.error || 'Bir hata oluştu.';
                    btn.disabled = false;
                    btn.textContent = 'Tekrar Dene';
                }
            } catch (err) {
                msgBox.style.display = 'block';
                msgBox.className = 'error';
                msgBox.textContent = 'Sunucu bağlantı hatası.';
                btn.disabled = false;
                btn.textContent = 'Tekrar Dene';
            }
        });
    </script>
</body>
</html>
