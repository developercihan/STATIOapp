<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sinyal Kayıp - Statio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .error-code { font-size: 8em; font-family: var(--font-heading); color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); margin:0;}
    </style>
</head>
<body>
    <div class="stardust"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="error-page">
        <div class="spaceship">🛸</div>
        <h1 class="error-code">404</h1>
        <h2 style="color:var(--text-primary); font-family: var(--font-heading); text-transform: uppercase;">SİNYAL KAYIP</h2>
        <p style="color:var(--text-secondary); max-width: 400px; margin-bottom: 30px;">Aradığınız istasyon haritada bulunmuyor veya warp sıçraması sırasında yok oldu.</p>
        <a href="/" class="btn btn-primary" style="padding: 15px 30px;">Ana Üsse Dön</a>
    </div>
</body>
</html>
